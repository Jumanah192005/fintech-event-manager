<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="فنتك في حياتنا">
<title>فنتك في حياتنا — نظام إدارة الفعالية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C8A45C;
  --gold-dark: #A8842C;
  --gold-light: #E8D5A8;
  --navy: #0F172A;
  --navy-light: #1E293B;
  --slate-50: #F8FAFC;
  --slate-100: #F1F5F9;
  --slate-200: #E2E8F0;
  --slate-300: #CBD5E1;
  --slate-400: #94A3B8;
  --slate-500: #64748B;
  --slate-700: #334155;
  --slate-900: #0F172A;
  --blue: #2563EB;
  --green: #059669;
  --red: #DC2626;
  --orange: #D97706;
  --purple: #7C3AED;
  --radius: 14px;
  --radius-sm: 10px;
  --radius-xs: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --shadow-xl: 0 24px 64px rgba(0,0,0,0.18);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Tajawal', sans-serif;
  background: var(--slate-50);
  color: var(--slate-900);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--slate-300); border-radius: 3px; }

/* ── Animations ── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
@keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes slideDown { from { opacity: 0; transform: translate(-50%,-20px); } to { opacity: 1; transform: translate(-50%,0); } }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
@keyframes twinkle { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.6; } }
@keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

.animate-in { animation: fadeIn 0.4s ease both; }
.animate-slide { animation: slideRight 0.35s ease both; }
.animate-scale { animation: scaleIn 0.3s ease both; }

/* ── Login Screen ── */
#loginScreen {
  min-height: 100vh;
  background: linear-gradient(135deg, #0a0f1e 0%, #141c30 40%, #0a0f1e 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  overflow: hidden;
}
#loginScreen::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(ellipse at 30% 20%, rgba(200,164,92,0.06) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 80%, rgba(37,99,235,0.04) 0%, transparent 50%);
  pointer-events: none;
}
.login-stars {
  position: absolute; width: 2px; height: 2px; background: var(--gold);
  border-radius: 50%; animation: twinkle 3s ease-in-out infinite;
}
.login-card {
  background: #fff;
  border-radius: 24px;
  padding: 40px 36px;
  width: min(92%, 420px);
  box-shadow: var(--shadow-xl);
  position: relative;
  overflow: hidden;
  animation: scaleIn 0.5s ease;
}
.login-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--gold), var(--gold-dark), var(--gold));
  background-size: 200% 100%;
  animation: gradientMove 3s ease infinite;
}
.login-logo {
  width: 68px; height: 68px; border-radius: 18px;
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 30px; font-weight: 900; color: #fff;
  margin-bottom: 14px;
  box-shadow: 0 8px 24px rgba(200,164,92,0.3);
}
.login-title {
  font-size: 28px; font-weight: 900;
  background: linear-gradient(135deg, var(--gold), #8B6914);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}
.login-sub { font-size: 13px; color: var(--slate-500); margin-bottom: 28px; }
.login-tabs {
  display: flex; background: var(--slate-100); border-radius: 12px;
  padding: 4px; margin-bottom: 24px; gap: 0;
}
.login-tab {
  flex: 1; padding: 11px; border-radius: 10px; border: none;
  cursor: pointer; font-family: inherit; font-weight: 700; font-size: 14px;
  transition: all 0.25s; background: transparent; color: var(--slate-400);
}
.login-tab.active {
  background: #fff; color: var(--slate-900);
  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
}
.demo-btn {
  display: flex; align-items: center; gap: 12px; width: 100%;
  padding: 15px 18px; border: 1.5px solid var(--slate-200); border-radius: 14px;
  cursor: pointer; font-family: inherit; background: #fff; margin-bottom: 10px;
  transition: all 0.25s; text-align: right;
}
.demo-btn:hover { border-color: var(--gold); background: rgba(200,164,92,0.03); transform: translateX(-2px); }
.demo-avatar {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 800; font-size: 16px; flex-shrink: 0;
}
.demo-arrow { margin-right: auto; color: var(--gold); font-size: 18px; transition: transform 0.2s; }
.demo-btn:hover .demo-arrow { transform: translateX(-4px); }

/* ── App Layout ── */
#appScreen { display: none; min-height: 100vh; }
.topbar {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
  color: #fff; padding: 0 20px; height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}
.topbar-brand { display: flex; align-items: center; gap: 12px; }
.topbar-logo {
  width: 34px; height: 34px; border-radius: 9px;
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 14px; color: #fff;
}
.topbar-title { font-weight: 800; font-size: 15px; letter-spacing: -0.3px; }
.topbar-subtitle { font-size: 9px; opacity: 0.5; }
.menu-btn {
  background: rgba(255,255,255,0.08); border: none; color: #fff;
  border-radius: 8px; width: 38px; height: 38px; cursor: pointer;
  font-size: 18px; display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.menu-btn:hover { background: rgba(255,255,255,0.15); }
.topbar-user { display: flex; align-items: center; gap: 10px; }
.topbar-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 13px; color: #fff;
}
.topbar-username { font-size: 12px; font-weight: 600; }
.topbar-role { font-size: 9px; opacity: 0.5; }
.pending-badge {
  background: var(--red); color: #fff; border: none; border-radius: 20px;
  padding: 4px 12px; font-size: 10px; font-weight: 800; cursor: pointer;
  font-family: inherit; animation: pulse 2s ease infinite;
}

/* ── Sidebar ── */
.sidebar-overlay {
  position: fixed; inset: 0; top: 60px; background: rgba(0,0,0,0.4);
  z-index: 89; display: none; backdrop-filter: blur(2px);
}
.sidebar-overlay.open { display: block; }
.sidebar {
  position: fixed; top: 60px; bottom: 0; right: -280px;
  width: 270px; background: var(--navy); z-index: 90;
  transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  overflow-y: auto; padding: 20px 14px;
  box-shadow: -4px 0 24px rgba(0,0,0,0.3);
}
.sidebar.open { right: 0; }
.sidebar-profile {
  padding: 14px 16px; background: rgba(200,164,92,0.08);
  border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(200,164,92,0.12);
}
.sidebar-name { font-size: 14px; font-weight: 700; color: var(--gold); }
.sidebar-title { font-size: 11px; color: var(--slate-400); margin-top: 2px; }
.nav-btn {
  display: flex; align-items: center; gap: 10px; width: 100%;
  padding: 12px 16px; border: none; border-radius: var(--radius-sm);
  cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 500;
  margin-bottom: 3px; transition: all 0.2s;
  background: transparent; color: var(--slate-400);
}
.nav-btn:hover { background: rgba(255,255,255,0.05); color: var(--slate-300); }
.nav-btn.active {
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: #fff; font-weight: 700;
}
.nav-btn .nav-icon { font-size: 16px; width: 24px; text-align: center; }
.nav-divider { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 14px 0; }
.logout-btn {
  display: flex; align-items: center; gap: 10px; width: 100%;
  padding: 12px 16px; border: none; border-radius: var(--radius-sm);
  cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 600;
  background: transparent; color: #EF4444; transition: all 0.2s;
}
.logout-btn:hover { background: rgba(239,68,68,0.08); }

/* ── Main Content ── */
.main-content { padding: 20px; max-width: 1100px; margin: 0 auto; }

/* ── Cards ── */
.card {
  background: #fff; border-radius: var(--radius); padding: 22px;
  box-shadow: var(--shadow); transition: all 0.3s; border: 1px solid transparent;
}
.card:hover { box-shadow: var(--shadow-lg); }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
.card-title { font-size: 18px; font-weight: 800; }

/* ── Stats Grid ── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 22px; }
.stat-card {
  background: #fff; border-radius: var(--radius); padding: 18px;
  box-shadow: var(--shadow); display: flex; align-items: center;
  gap: 14px; transition: transform 0.2s;
}
.stat-card:hover { transform: translateY(-2px); }
.stat-icon {
  width: 46px; height: 46px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
}
.stat-label { font-size: 12px; color: var(--slate-500); margin-bottom: 2px; }
.stat-value { font-size: 26px; font-weight: 900; }
.stat-sub { font-size: 11px; color: var(--slate-400); margin-top: 1px; }

/* ── Badges ── */
.badge {
  display: inline-block; padding: 3px 12px; border-radius: 20px;
  font-size: 11px; font-weight: 700; white-space: nowrap;
}

/* ── Buttons ── */
.btn {
  border: none; border-radius: var(--radius-sm); cursor: pointer;
  font-weight: 700; font-family: inherit; transition: all 0.2s;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 20px; font-size: 13px;
}
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: #fff; box-shadow: 0 4px 12px rgba(200,164,92,0.3);
}
.btn-primary:hover { box-shadow: 0 6px 20px rgba(200,164,92,0.4); }
.btn-secondary { background: var(--slate-100); color: var(--slate-700); }
.btn-success { background: #ECFDF5; color: var(--green); }
.btn-danger { background: #FEF2F2; color: var(--red); }
.btn-sm { padding: 6px 14px; font-size: 12px; }
.btn-lg { padding: 14px 28px; font-size: 15px; }
.btn-block { width: 100%; justify-content: center; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── Form ── */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 13px; font-weight: 700; color: var(--slate-700); margin-bottom: 6px; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 11px 14px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--slate-200); font-size: 14px; font-family: inherit;
  transition: border-color 0.2s; background: #fff;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline: none; border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(200,164,92,0.1);
}
.form-textarea { resize: vertical; min-height: 100px; }
.form-error { color: var(--red); font-size: 12px; text-align: center; margin-bottom: 12px; }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 1000;
  display: none; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.55); backdrop-filter: blur(6px); padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: #fff; border-radius: 20px; padding: 28px;
  width: min(92%, 520px); max-height: 85vh; overflow-y: auto;
  animation: scaleIn 0.25s ease;
  box-shadow: 0 32px 80px rgba(0,0,0,0.25);
}
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-title { font-size: 19px; font-weight: 800; }
.modal-close {
  background: var(--slate-100); border: none; border-radius: 8px;
  width: 34px; height: 34px; cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.modal-close:hover { background: var(--slate-200); }

/* ── Progress Bar ── */
.progress-bar { width: 100%; height: 8px; border-radius: 8px; background: var(--slate-200); overflow: hidden; }
.progress-fill { height: 100%; border-radius: 8px; transition: width 0.6s ease; }

/* ── Task Card ── */
.task-card {
  background: #fff; border-radius: var(--radius); padding: 18px;
  box-shadow: var(--shadow); margin-bottom: 12px; transition: all 0.25s;
  border-right: 4px solid transparent;
}
.task-card:hover { box-shadow: var(--shadow-lg); transform: translateX(-2px); }
.task-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.task-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.task-desc { font-size: 12px; color: var(--slate-500); margin-bottom: 8px; line-height: 1.6; }
.task-meta { display: flex; gap: 14px; font-size: 11px; color: var(--slate-400); flex-wrap: wrap; }
.task-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }

/* ── Filter Bar ── */
.filter-bar { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-btn {
  padding: 7px 16px; border-radius: 20px; border: 1.5px solid var(--slate-200);
  cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 600;
  background: #fff; color: var(--slate-500); transition: all 0.2s;
}
.filter-btn.active { border-color: var(--gold); background: rgba(200,164,92,0.06); color: var(--gold-dark); }
.filter-btn:hover { border-color: var(--gold-light); }

/* ── Report Card ── */
.report-card {
  background: #fff; border-radius: var(--radius); padding: 20px;
  box-shadow: var(--shadow); margin-bottom: 12px; transition: all 0.25s;
}
.report-card:hover { box-shadow: var(--shadow-lg); }

/* ── Approval Card ── */
.approval-card {
  background: #fff; border-radius: var(--radius); padding: 20px;
  box-shadow: var(--shadow); margin-bottom: 12px; transition: all 0.25s;
  border-right: 4px solid;
}

/* ── Announcement Card ── */
.announcement-card {
  background: #fff; border-radius: var(--radius); padding: 20px;
  box-shadow: var(--shadow); margin-bottom: 14px;
  border-right: 4px solid var(--gold);
  transition: all 0.25s;
}
.announcement-card:hover { box-shadow: var(--shadow-lg); }
.ann-avatar {
  width: 42px; height: 42px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 800; font-size: 16px; flex-shrink: 0;
}

/* ── Team Card ── */
.dept-card {
  background: #fff; border-radius: var(--radius); padding: 20px;
  box-shadow: var(--shadow); cursor: pointer; transition: all 0.25s;
  border-top: 4px solid;
}
.dept-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
.dept-card.selected { box-shadow: var(--shadow-lg); }
.team-chip {
  display: inline-block; padding: 5px 12px; border-radius: 8px;
  font-size: 11px; font-weight: 600; margin: 3px;
}
.member-card {
  padding: 14px; border-radius: 12px; border: 1px solid var(--slate-200);
  display: flex; align-items: center; gap: 10px; transition: all 0.2s;
}
.member-card:hover { border-color: var(--gold-light); background: rgba(200,164,92,0.02); }
.member-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 800; font-size: 14px; flex-shrink: 0;
}

/* ── Structure ── */
.founder-card {
  background: linear-gradient(135deg, var(--navy), var(--navy-light));
  color: #fff; border-radius: var(--radius); padding: 28px;
  border: 2px solid var(--gold); text-align: center; margin-bottom: 22px;
}
.founder-avatar {
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  display: inline-flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 20px; margin-bottom: 6px;
}

/* ── Timeline ── */
.phase-card {
  min-width: 180px; padding: 16px; border-radius: 12px;
  text-align: center; flex-shrink: 0;
}
.phase-num {
  width: 36px; height: 36px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 16px; color: #fff; margin-bottom: 8px;
}
.timeline-item { display: flex; gap: 14px; }
.timeline-dot {
  width: 14px; height: 14px; border-radius: 50%; border: 3px solid #fff;
  flex-shrink: 0; z-index: 1;
}
.timeline-line { width: 2px; flex: 1; background: var(--slate-200); }

/* ── Circle Progress ── */
.circle-progress { position: relative; width: 120px; height: 120px; }
.circle-progress svg { width: 120px; height: 120px; transform: rotate(-90deg); }
.circle-text {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; flex-direction: column;
}

/* ── Empty State ── */
.empty-state { text-align: center; padding: 48px 20px; color: var(--slate-400); }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-title { font-size: 16px; font-weight: 700; color: var(--slate-500); margin-bottom: 4px; }

/* ── Page Header ── */
.page-header { margin-bottom: 22px; }
.page-title { font-size: 26px; font-weight: 900; margin-bottom: 2px; }
.page-sub { color: var(--slate-500); font-size: 13px; }

/* ── Grid helpers ── */
.grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; }
.flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
.flex-center { display: flex; align-items: center; gap: 10px; }
.gap-6 { gap: 6px; }
.mb-12 { margin-bottom: 12px; }
.mb-16 { margin-bottom: 16px; }
.mb-20 { margin-bottom: 20px; }
.mb-24 { margin-bottom: 24px; }
.mt-10 { margin-top: 10px; }
.text-center { text-align: center; }

/* ── Responsive ── */
@media (max-width: 600px) {
  .main-content { padding: 14px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .stat-card { padding: 14px; gap: 10px; }
  .stat-value { font-size: 22px; }
  .stat-icon { width: 40px; height: 40px; font-size: 18px; }
  .page-title { font-size: 22px; }
  .card { padding: 16px; }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .topbar { padding: 0 12px; }
  .login-card { padding: 28px 22px; }
}
/* Searchable dropdown */
.search-select-wrap { position:relative; }
.search-select-input { width:100%;padding:10px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;font-family:Tajawal,sans-serif;background:#fff;direction:rtl;box-sizing:border-box;transition:border 0.2s; }
.search-select-input:focus { border-color:var(--gold);outline:none;box-shadow:0 0 0 3px rgba(200,164,92,0.1); }
.search-select-list { position:absolute;top:100%;right:0;left:0;background:#fff;border:1.5px solid #E2E8F0;border-radius:10px;margin-top:4px;max-height:200px;overflow-y:auto;z-index:999;display:none;box-shadow:0 8px 24px rgba(0,0,0,0.12); }
.search-select-list.open { display:block; }

var firebaseConfig = {

};
var auth = null;

var _fbReady = false;
var _fbListenersActive = false;
var _suppressSync = false;
var _firebaseAvailable = false;
var _fbScriptsLoaded = 0;
var _authActionInProgress = false; // Prevent onAuthStateChanged interference

// Load Firebase scripts dynamically
function loadFirebaseScripts() {
  var scripts = [
    'https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js',
    'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js',
    'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js',
    'https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js'
  ];
  var loaded = 0;
  scripts.forEach(function(src, idx) {
    var s = document.createElement('script');
    s.src = src;
    s.async = false; // preserve order
    s.onload = function() {
      loaded++;
      if(loaded === scripts.length) {
        initFirebase();
      }
    };
    s.onerror = function() {
      console.log('⚠️ Firebase script blocked — offline mode');
      _firebaseAvailable = false;
      startOfflineMode();
    };
    document.head.appendChild(s);
  });
}

function initFirebase() {
  try {
    firebase.initializeApp(firebaseConfig);
    auth = firebase.auth();
    db = firebase.firestore();
    storage = firebase.storage();
    // Verify Storage connection
    try {
      storage.ref('test').getDownloadURL().catch(function(){});
      console.log('📁 Storage initialized');
    } catch(e) {
      console.warn('📁 Storage init warning:', e);
    }
    db.enablePersistence({synchronizeTabs:true}).catch(function(err){console.log('Persistence:',err.code)});
    _firebaseAvailable = true;
    console.log('🔥 Firebase initialized');
    // Hide demo login when Firebase is active
    var demoTab = document.getElementById('tabDemo');
    if(demoTab) demoTab.style.display='none';
    // Now check auth state (auto-login on page reload)
    auth.onAuthStateChanged(function(firebaseUser) {
      if(_authActionInProgress || currentUser) return; // Skip if login/register in progress
      if(firebaseUser) {
        fbLoadAll().then(function() {
          if(currentUser) return; // Already logged in by handleLogin/handleRegister
          var found = members.find(function(m){return m.email===firebaseUser.email || m.uid===firebaseUser.uid});
          if(found) {
            found.uid = firebaseUser.uid;
            _fbReady = true;
            login(found);
          } else {
            // User in Auth but not in Firestore members — might be new, wait
            console.log('Auth user not found in members, waiting for registration...');
          }
        }).catch(function(e) {
          console.warn('Firestore load failed, using cache:', e);
          var cached = loadSession();
          if(cached && !currentUser) { _fbReady = true; login(cached); }
        });
      }
    });
    setTimeout(function(){ if(_fbReady) fbSeedDefaults(); }, 3000);
  } catch(e) {
    console.log('⚠️ Firebase init failed:', e);
    _firebaseAvailable = false;
    startOfflineMode();
  }
}

function startOfflineMode() {
  // Fallback: use localStorage only (original behavior)
  var cached = loadSession();
  if(cached) login(cached);
  updateSyncStatus(false);
}

// Strip large file data before saving to Firestore (1MB doc limit)
function cleanForDb(obj) {
  if(!obj) return obj;
  var c = Object.assign({}, obj);
  // Keep URLs, and keep base64 for small files (< 900KB) as fallback
  if(c.file) {
    if(c.file.url) {
      c.file = {name:c.file.name,size:c.file.size,type:c.file.type,url:c.file.url};
    } else if(c.file.data) {
      // Keep base64 if small enough for Firestore (< 900KB)
      if(c.file.data.length < 900000) {
        // Keep data for Firestore
      } else {
        c.file = {name:c.file.name,size:c.file.size,type:c.file.type};
      }
    }
  }
  if(c.responseFile) {
    if(c.responseFile.url) c.responseFile = {name:c.responseFile.name,size:c.responseFile.size,type:c.responseFile.type,url:c.responseFile.url};
    else if(c.responseFile.data && c.responseFile.data.length < 900000) { /* keep */ }
    else if(c.responseFile.data) c.responseFile = {name:c.responseFile.name,size:c.responseFile.size,type:c.responseFile.type};
  }
  if(c.images && c.images.length) c.images = c.images.map(function(img){
    if(img.url) return {name:img.name,size:img.size,url:img.url};
    if(img.data && img.data.length < 900000) return img; // Keep small images
    return {name:img.name,size:img.size};
  });
  return c;
}

// ═══════════════════════════════════════
// FIREBASE STORAGE — Cloud File Storage
// ═══════════════════════════════════════
function uploadToStorage(fileObj, folder) {
  if(!fileObj || !fileObj.data) return Promise.resolve(fileObj);
  
  // If Storage not available, store base64 directly in Firestore (for small files < 800KB)
  if(!storage || !_firebaseAvailable) {
    console.warn('📁 Storage not available, keeping base64');
    return Promise.resolve(fileObj);
  }

  try {
    var parts = fileObj.data.split(',');
    var mime = parts[0].match(/:(.*?);/)[1];
    var bstr = atob(parts[1]);
    var arr = new Uint8Array(bstr.length);
    for(var i=0;i<bstr.length;i++) arr[i]=bstr.charCodeAt(i);
    var blob = new Blob([arr], {type: mime});
    console.log('📁 Uploading:', fileObj.name, '('+Math.round(blob.size/1024)+'KB)');
  } catch(e) {
    console.error('📁 File conversion error:', e);
    return Promise.resolve(fileObj);
  }
  var path = 'files/' + folder + '/' + Date.now() + '_' + (fileObj.name||'file');
  return storage.ref(path).put(blob, {contentType: mime}).then(function(snap) {
    return snap.ref.getDownloadURL();
  }).then(function(url) {
    console.log('📁 ✅ Uploaded:', fileObj.name, '→', url);
    showToast('✅ تم رفع الملف بنجاح','#059669');
    return {name: fileObj.name, size: fileObj.size, type: fileObj.type, url: url};
  }).catch(function(err) {
    console.error('📁 ❌ Upload failed:', err.code, err.message, err);
    showToast('⚠️ فشل رفع الملف: ' + (err.code||err.message||'خطأ غير معروف'),'#DC2626');
    // Fallback: keep base64 data so at least it works on this device
    return fileObj;
  });
}

function uploadImagesToStorage(images) {
  if(!storage || !_firebaseAvailable || !images || !images.length) return Promise.resolve(images||[]);
  return Promise.all(images.map(function(img) {
    if(img.url) return Promise.resolve(img);
    return uploadToStorage(img, 'images');
  }));
}

// Save a collection to Firestore
function fbSaveCollection(colName, items) {
  if(!_fbReady || !_firebaseAvailable || !db) return Promise.resolve();
  // Save each document individually to handle size limits
  var promises = items.map(function(item) {
    var cleaned = cleanForDb(item);
    return db.collection(colName).doc(String(item.id)).set(cleaned).catch(function(e) {
      if(e.message && e.message.indexOf('exceeds the maximum') > -1) {
        // Document too large — strip file data and retry
        console.warn('📁 Doc too large, stripping file data:', item.id);
        if(cleaned.file && cleaned.file.data) cleaned.file = {name:cleaned.file.name,size:cleaned.file.size,type:cleaned.file.type};
        if(cleaned.images) cleaned.images = cleaned.images.map(function(img){return {name:img.name,size:img.size,url:img.url||null}});
        return db.collection(colName).doc(String(item.id)).set(cleaned).catch(function(e2){
          console.warn('FB save '+colName+' item '+item.id+':', e2);
        });
      }
      console.warn('FB save '+colName+' item '+item.id+':', e);
    });
  });
  return Promise.all(promises);
}

function fbDelete(colName, id) {
  if(!_fbReady || !_firebaseAvailable || !db) return;
  db.collection(colName).doc(String(id)).delete().catch(function(e){});

function fbSaveSettings(key, data) {
  if(!_fbReady || !_firebaseAvailable || !db) return;

// Load all data from Firestore
function fbLoadAll() {
  if(!_firebaseAvailable || !db) return Promise.resolve(false);
  return Promise.all([
    db.collection('members').get(),
    db.collection('tasks').get(),
    db.collection('reports').get(),
    db.collection('approvals').get(),
    db.collection('announcements').get(),
    db.collection('companies').get(),
    db.collection('warnings').get(),
    db.collection('bugReports').get(),
    db.collection('settings').doc('wbsPhases').get(),
    db.collection('settings').doc('timelinePhases').get(),
    db.collection('settings').doc('orgReport').get()
  ]).then(function(results) {
    if(results[0].size>0) members = results[0].docs.map(function(d){return d.data()});
    if(results[1].size>0) tasks = results[1].docs.map(function(d){return d.data()});
    if(results[2].size>0) reports = results[2].docs.map(function(d){return d.data()});
    if(results[3].size>0) approvals = results[3].docs.map(function(d){return d.data()});
    if(results[4].size>0) announcements = results[4].docs.map(function(d){return d.data()});
    if(results[5].size>0) companies = results[5].docs.map(function(d){return d.data()});
    if(results[6].size>0) warnings = results[6].docs.map(function(d){return d.data()});
    if(results[7].size>0) bugReports = results[7].docs.map(function(d){return d.data()});
    if(results[8].exists) try{wbsPhases=JSON.parse(results[8].data().data)}catch(e){}
    if(results[9].exists) try{timelinePhases=JSON.parse(results[9].data().data)}catch(e){}
    if(results[10].exists) try{orgReportSections=JSON.parse(results[10].data().data)}catch(e){}
    console.log('🔥 Firebase data loaded');
    // Merge file data from localStorage cache (Firestore strips large files)
    try {
      var cachedR = JSON.parse(localStorage.getItem('fintech_reports')||'[]');
      var cachedA = JSON.parse(localStorage.getItem('fintech_approvals')||'[]');
      reports.forEach(function(r){
        if(!r.file || !r.file.data) {
          var cr = cachedR.find(function(x){return String(x.id)===String(r.id)});
          if(cr && cr.file && cr.file.data) r.file = cr.file;
          if(cr && cr.images) r.images = cr.images;
        }
      });
      approvals.forEach(function(a){
        if(!a.file || !a.file.data) {
          var ca = cachedA.find(function(x){return String(x.id)===String(a.id)});
          if(ca && ca.file && ca.file.data) a.file = ca.file;
          if(ca && ca.responseFile && ca.responseFile.data) a.responseFile = ca.responseFile;
        }
      });
    } catch(e){}
    return true;
  });
}

// Setup real-time listeners
function fbListen() {
  if(_fbListenersActive || !_firebaseAvailable || !db) return;
  _fbListenersActive = true;
  var cols = [
    {name:'members', target:function(d){members=d}},
    {name:'tasks', target:function(d){tasks=d}},
    {name:'reports', target:function(d){
      // Preserve file data from local copies (Firestore strips base64)
      d.forEach(function(nr){ var old=reports.find(function(o){return String(o.id)===String(nr.id)}); if(old){ if(old.file&&(old.file.data||old.file.url)&&(!nr.file||(!nr.file.data&&!nr.file.url))) nr.file=old.file; if(old.images&&old.images.length) nr.images=old.images; } });
      reports=d;
    }},
    {name:'approvals', target:function(d){
      d.forEach(function(na){ var old=approvals.find(function(o){return String(o.id)===String(na.id)}); if(old){ if(old.file&&(old.file.data||old.file.url)&&(!na.file||(!na.file.data&&!na.file.url))) na.file=old.file; if(old.responseFile&&(old.responseFile.data||old.responseFile.url)&&(!na.responseFile||(!na.responseFile.data&&!na.responseFile.url))) na.responseFile=old.responseFile; } });
      approvals=d;
    }},
    {name:'announcements', target:function(d){announcements=d}},
    {name:'companies', target:function(d){companies=d}},
    {name:'warnings', target:function(d){warnings=d}},
    {name:'bugReports', target:function(d){bugReports=d}}
  ];
  cols.forEach(function(col) {
    db.collection(col.name).onSnapshot(function(snap) {
      if(_suppressSync) return;
      var newData = snap.docs.map(function(d){return d.data()});
      col.target(newData);
      console.log('🔄 Synced '+col.name+': '+newData.length+' docs');
      if(currentUser && _fbReady) {
        try { renderCurrentPage(); updatePendingBadge(); } catch(e){}
      }
    }, function(err){ console.error('Listener error '+col.name+':', err); });
  });
  // Settings listeners
  ['wbsPhases','timelinePhases','orgReport'].forEach(function(key){
    db.collection('settings').doc(key).onSnapshot(function(snap){
      if(_suppressSync || !snap.exists) return;
      try {
        var d = JSON.parse(snap.data().data);
        if(key==='wbsPhases') wbsPhases=d;
        if(key==='timelinePhases') timelinePhases=d;
        if(key==='orgReport') orgReportSections=d;
      } catch(e){}
    }, function(err){ console.error('Settings listener error:', err); });
  });
}

// Render current page (for sync updates)
function renderCurrentPage() {

function sendEmailNotification(toEmail, subject, bodyHtml, callback) {
  if(!emailNotificationsEnabled || !toEmail || !toEmail.includes('@')) {
    if(callback) callback(false);
    return;
  }
  try {
    var styledBody = '<div dir="rtl" style="font-family:Tajawal,Arial,sans-serif;max-width:600px;margin:0 auto;padding:24px;background:#ffffff;border-radius:12px;border:1px solid #E2E8F0">' +
      '<div style="text-align:center;padding:16px 0;margin-bottom:20px;border-bottom:2px solid #C8A45C">' +

      '<div style="font-size:12px;color:#94A3B8;margin-top:4px">نظام إدارة ومتابعة الفعالية</div></div>' +
      bodyHtml +
      '<div style="margin-top:24px;padding-top:16px;border-top:1px solid #E2E8F0;text-align:center;font-size:11px;color:#94A3B8">' +
      'هذا إشعار تلقائي من نظام إدارة فعالية فنتك في حياتنا<br>© '+new Date().getFullYear()+' نادي TechNation</div></div>';

    if(typeof emailjs==='undefined'){
      console.log('📧 EmailJS not loaded — skipping email');
      if(callback) callback(false);
      return;
    }
    try{emailjs.init(EMAILJS_KEY)}catch(e){}
    emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
      to_email: toEmail,
      subject: '🔔 ' + subject + ' — فنتك في حياتنا',
      message: styledBody
    }).then(function(){
      console.log('📧 Email sent to: '+toEmail);
      if(callback) callback(true);
    }, function(err){
      console.log('📧 Email failed:', err);
      if(callback) callback(false);
    });
  } catch(e) {
    console.log('📧 Email error:', e);
    if(callback) callback(false);
  }
}

function buildSearchSelect(containerId, opts) {
  // opts: { members: [...], filterRole: 'member'|null, placeholder, hiddenInputId, showCurrentFirst: true }
  var el = document.getElementById(containerId);
  if(!el) return;
  var filterRole = opts.filterRole || null;
  var placeholder = opts.placeholder || 'ابحث باسم العضو...';
  var hiddenId = opts.hiddenInputId || containerId+'_val';
  var list = (filterRole ? members.filter(function(m){return m.role===filterRole}) : members).slice();

  // Current user first
  if(opts.showCurrentFirst !== false && currentUser) {
    list.sort(function(a,b){
      if(String(a.id)===String(currentUser.id)) return -1;
      if(String(b.id)===String(currentUser.id)) return 1;
      return a.name.localeCompare(b.name,'ar');
    });
  }

  var roleLabels = {admin:'مدير',supervisor:'مشرف',member:'عضو'};
  var html = '<div class="search-select-wrap">' +
    '<input type="hidden" id="'+hiddenId+'">' +
    '<input type="text" class="search-select-input" id="'+containerId+'_input" placeholder="'+placeholder+'" autocomplete="off">' +
    '<div class="search-select-list" id="'+containerId+'_list">';

  list.forEach(function(m){
    var isMe = String(m.id)===String(currentUser.id);
    var team = getTeam(m.teamId);
    var teamName = team ? team.name : '';
    var badges = '';
    if(isMe) badges += '<span class="ss-badge ss-me">أنا</span> ';
    badges += '<span class="ss-badge ss-role">'+roleLabels[m.role]+'</span>';
    html += '<div class="search-select-item" data-id="'+m.id+'" data-name="'+m.name+'" data-dept="'+(m.dept||0)+'" data-team="'+(m.teamId||0)+'">' +
      '<div><span style="font-weight:700">'+m.name+'</span>'+(teamName?' <span style="font-size:11px;color:var(--slate-400)">— '+teamName+'</span>':'')+'</div>' +
      '<div>'+badges+'</div></div>';
  });
  html += '</div></div>';
  el.innerHTML = html;

  // Wire up search
  var inp = document.getElementById(containerId+'_input');
  var listEl = document.getElementById(containerId+'_list');
  var hiddenInp = document.getElementById(hiddenId);

  inp.addEventListener('focus', function(){ listEl.classList.add('open'); });
  inp.addEventListener('input', function(){
    var q = inp.value.trim().toLowerCase();
    var items = listEl.querySelectorAll('.search-select-item');
    items.forEach(function(it){
      var name = it.getAttribute('data-name').toLowerCase();
      it.style.display = (!q || name.indexOf(q)!==-1) ? '' : 'none';
    });
    listEl.classList.add('open');
  });

  listEl.addEventListener('click', function(e){
    var item = e.target.closest('.search-select-item');
    if(!item) return;
    hiddenInp.value = item.getAttribute('data-id');
    inp.value = item.getAttribute('data-name');
    listEl.classList.remove('open');
    // Trigger change event for filtering
    if(opts.onChange) opts.onChange(item.getAttribute('data-id'));
  });

  document.addEventListener('click', function(e){
    if(!el.contains(e.target)) listEl.classList.remove('open');
  });

  // Pre-select default value (current user for companies)
  if(opts.defaultValue) {
    var defMember = list.find(function(m){return String(m.id)===String(opts.defaultValue)});
    if(defMember) {
      hiddenInp.value = defMember.id;
      inp.value = defMember.name;
    }
  }
}

function handleLogin() {
  const email = $('loginEmail').value.trim();
  const pass = $('loginPass').value;
  const errEl = $('loginError');
  errEl.style.display='none';
  if(!email||!pass) { errEl.style.display='block'; errEl.textContent='الرجاء إدخال البريد وكلمة المرور'; return; }

  // OFFLINE MODE: Firebase not available
  if(!_firebaseAvailable || !auth) {
    var found = members.find(function(m){return m.email===email});
    if(found && pass.length >= 3) { login(found); }
    else { errEl.style.display='block'; errEl.textContent='البريد الإلكتروني أو كلمة المرور غير صحيحة'; }
    return;
  }

  // ONLINE MODE: Firebase Auth
  errEl.style.display='block'; errEl.style.color='var(--blue)'; errEl.textContent='⏳ جاري تسجيل الدخول...';
  _authActionInProgress = true;

  auth.signInWithEmailAndPassword(email, pass).then(function(cred) {
    // Auth success - load all data from Firestore first
    return fbLoadAll().then(function(){
      var found = members.find(function(m){return m.email===email || m.uid===cred.user.uid});
      if(found) {
        found.uid = cred.user.uid;
        db.collection('members').doc(String(found.id)).set(found).catch(function(e){});
        login(found);
      } else {
        // User in Auth but not in Firestore — auto-create
        var isFirst = members.length === 0;
        var autoMember = {
          id: Date.now(), name: cred.user.displayName || email.split('@')[0],
          email: email, role: isFirst ? 'admin' : 'member', uid: cred.user.uid,
          teamId: null, dept: null, title: isFirst ? 'مدير' : 'عضو'
        };
        members.push(autoMember);
        return db.collection('members').doc(String(autoMember.id)).set(autoMember).then(function(){
          console.log('🔥 Auto-created member:', autoMember.name, autoMember.role);
          login(autoMember);
        });
      }
    });
  }).catch(function(err) {
    _authActionInProgress = false;
    errEl.style.color='#DC2626';
    errEl.style.display='block';
    var msg = 'البريد الإلكتروني أو كلمة المرور غير صحيحة';
    console.error('Login error:', err.code, err.message);
    if(err.code==='auth/user-not-found') msg='هذا البريد غير مسجل — سجّل حساب جديد';
    if(err.code==='auth/wrong-password'||err.code==='auth/invalid-credential') msg='كلمة المرور غير صحيحة';
    if(err.code==='auth/too-many-requests') msg='محاولات كثيرة — حاول بعد دقائق';
    if(err.code==='auth/network-request-failed') msg='لا يوجد اتصال بالإنترنت';
    if(err.code==='auth/operation-not-allowed') msg='تسجيل الإيميل غير مفعّل — فعّله من Firebase Console';
    errEl.textContent = msg + ' [' + (err.code||'') + ']';
  });
}

function handleRegister() {
  const name = $('regName').value.trim();
  const email = $('regEmail').value.trim();
  const pass = $('regPass').value;
  const passConfirm = $('regPassConfirm').value;
  const role = $('regRole').value;
  const deptId = parseInt($('regDept').value) || null;
  const teamId = parseInt($('regTeam').value) || null;
  const errEl = $('regError');
  const sucEl = $('regSuccess');
  errEl.style.display = 'none'; sucEl.style.display = 'none';

  if(!name) { errEl.style.display='block'; errEl.textContent='الرجاء إدخال الاسم الكامل'; return; }
  if(!email || !email.includes('@')) { errEl.style.display='block'; errEl.textContent='الرجاء إدخال بريد إلكتروني صحيح'; return; }
  if(pass.length < 6) { errEl.style.display='block'; errEl.textContent='كلمة المرور يجب أن تكون 6 أحرف على الأقل'; return; }
  if(pass !== passConfirm) { errEl.style.display='block'; errEl.textContent='كلمة المرور غير متطابقة'; return; }
  if(role==='member' && !teamId) { errEl.style.display='block'; errEl.textContent='الرجاء اختيار الإدارة والفريق'; return; }

  // OFFLINE MODE: no Firebase
  if(!_firebaseAvailable || !auth) {
    if(members.find(function(m){return m.email===email})) { errEl.style.display='block'; errEl.textContent='البريد الإلكتروني مسجل مسبقاً'; return; }
    var newMember = {
      id: Date.now(), name:name, email:email, role:role,
      teamId: (role==='supervisor'||role==='admin') ? null : teamId,
      dept: (role==='supervisor'||role==='admin') ? null : deptId,
      title: role==='admin' ? 'مدير' : role==='supervisor' ? 'مشرف الفعالية' : 'عضو'
    };
    members.push(newMember);
    sucEl.style.display='block'; sucEl.textContent='✅ تم إنشاء حسابك بنجاح! جاري تسجيل الدخول...';
    setTimeout(function(){ login(newMember); }, 1000);
    return;
  }

  // ONLINE MODE: Firebase Auth
  sucEl.style.display='block'; sucEl.textContent='⏳ جاري إنشاء الحساب...';
  _authActionInProgress = true;

  // Check if email exists in members (pre-registered by admin)
  var existing = members.find(function(m){return m.email===email});

  auth.createUserWithEmailAndPassword(email, pass).then(function(cred) {
    var newMember;
    if(existing) {
      existing.uid = cred.user.uid;
      if(name) existing.name = name;
      newMember = existing;
    } else {
      // First user ever? Make them admin automatically
      var actualRole = role;
      if(members.length === 0) {
        actualRole = 'admin';
        console.log('🔥 First user — auto-assigned as admin');
      }
      newMember = {
        id: Date.now(), name:name, email:email, role:actualRole, uid:cred.user.uid,
        teamId: (actualRole==='supervisor'||actualRole==='admin') ? null : teamId,
        dept: (actualRole==='supervisor'||actualRole==='admin') ? null : deptId,
        title: actualRole==='admin' ? 'مدير' : actualRole==='supervisor' ? 'مشرف الفعالية' : 'عضو'
      };
      members.push(newMember);
    }

    // WAIT for Firestore write to complete, then login
    db.collection('members').doc(String(newMember.id)).set(newMember).then(function(){
      console.log('🔥 Member saved to Firestore:', newMember.name, newMember.role);
      sucEl.textContent = '✅ تم إنشاء حسابك بنجاح! جاري تسجيل الدخول...';
      setTimeout(function(){ login(newMember); }, 800);
    }).catch(function(e){
      console.error('🔥 Firestore write FAILED:', e);
      sucEl.textContent = '✅ تم إنشاء الحساب (حفظ محلي)';
      // Still login even if Firestore fails
      setTimeout(function(){ login(newMember); }, 800);
    });
  }).catch(function(err) {
    _authActionInProgress = false;
    sucEl.style.display='none';
    errEl.style.display='block';
    var msg = 'حدث خطأ أثناء التسجيل';
    console.error('Register error:', err.code, err.message);
    if(err.code==='auth/email-already-in-use') {
      // Email exists in Auth — try signing in and create/update member
      auth.signInWithEmailAndPassword(email, pass).then(function(cred){
        return fbLoadAll().then(function(){
          var found = members.find(function(m){return m.email===email || m.uid===cred.user.uid});
          if(found) {
            found.uid = cred.user.uid;
            if(name) found.name = name;
            db.collection('members').doc(String(found.id)).set(found).then(function(){
              login(found);
            });
          } else {
            var newMember = {
              id: Date.now(), name:name, email:email, role:role, uid:cred.user.uid,
              teamId: (role==='supervisor'||role==='admin') ? null : teamId,
              dept: (role==='supervisor'||role==='admin') ? null : deptId,
              title: role==='admin' ? 'مدير' : role==='supervisor' ? 'مشرف الفعالية' : 'عضو'
            };
            members.push(newMember);
            db.collection('members').doc(String(newMember.id)).set(newMember).then(function(){
              sucEl.style.display='block'; sucEl.textContent='✅ تم ربط حسابك! جاري الدخول...';
              setTimeout(function(){ login(newMember); }, 800);
            });
          }
        });
      }).catch(function(e2){
        _authActionInProgress = false;
        errEl.style.display='block'; errEl.textContent='البريد مسجل بكلمة مرور مختلفة — سجّل دخول من تاب تسجيل الدخول';
      });
      return;
    }
    if(err.code==='auth/weak-password') msg='كلمة المرور ضعيفة — استخدم 6 أحرف على الأقل';
    if(err.code==='auth/network-request-failed') msg='لا يوجد اتصال بالإنترنت';
    if(err.code==='auth/invalid-api-key') msg='مفتاح API غير صحيح';
    if(err.code==='auth/operation-not-allowed') msg='تسجيل الإيميل غير مفعّل — فعّله من Firebase Console';
    if(err.code==='auth/admin-restricted-operation') msg='التسجيل محظور — فعّل Email/Password من Authentication → Sign-in method';
    errEl.textContent = msg + ' [' + (err.code||'unknown') + ']';
  });
}

function demoLogin(role) {
  if(!_firebaseAvailable) {
    var map = {admin:members[0], supervisor:members[2], member:members[3]};
    login(map[role]);
  } else {
    showToast('⚠️ سجّل دخول بالإيميل وكلمة المرور','#D97706');
  }
}

function login(user) {
  _authActionInProgress = false;
  currentUser = user;
  if(currentUser) localStorage.setItem('fintech_session', JSON.stringify(currentUser));
  $('loginScreen').style.display = 'none';
  $('appScreen').style.display = 'block';
  _fbReady = true;
  fbListen(); // Start real-time sync
  setupApp();
  updateSyncStatus(navigator.onLine);
}

function toggleEmailNotif() {
  if(emailNotificationsEnabled) {
    // Confirm before disabling
    showModal('🔕 إيقاف الإشعارات',
      '<div style="text-align:center;padding:10px">' +
      '<div style="font-size:48px;margin-bottom:12px">📧</div>' +
      '<p style="font-size:15px;font-weight:700;margin-bottom:8px">هل تريد إيقاف إشعارات الإيميل؟</p>' +
      '<p style="font-size:13px;color:var(--slate-500);margin-bottom:20px;line-height:1.8">لن تصلك تنبيهات على بريدك عند رفع موافقات أو تقارير أو إعلانات جديدة</p>' +
      '<div style="display:flex;gap:10px">' +
      '<button class="btn btn-lg" style="flex:1;background:#DC2626;color:#fff" onclick="confirmToggleNotif()">🔕 نعم، إيقاف</button>' +
      '<button class="btn btn-secondary btn-lg" style="flex:1" onclick="hideModal()">إلغاء</button></div></div>');
  } else {
    emailNotificationsEnabled = true;
    localStorage.setItem('fintech_email_notif','true');
    updateEmailNotifLabel();
    showToast('📧 تم تفعيل إشعارات الإيميل','#059669');
  }
}

function confirmToggleNotif() {
  emailNotificationsEnabled = false;
  localStorage.setItem('fintech_email_notif','false');
  updateEmailNotifLabel();
  hideModal();
  showToast('🔕 تم إيقاف إشعارات الإيميل','#64748B');
}

function updateEmailNotifLabel() {
  var btn = document.getElementById('emailNotifBtn');
  var lbl = document.getElementById('emailNotifLabel');
  if(btn) {
    if(currentUser && currentUser.role==='supervisor') { btn.style.display='none'; return; }
    btn.style.display='';
  }
  if(btn && lbl) {
    lbl.textContent = emailNotificationsEnabled?'الإشعارات ✅':'الإشعارات 🔕';
    btn.style.background = emailNotificationsEnabled?'rgba(5,150,105,0.1)':'';
  }
}

function logout() {
  if(_firebaseAvailable && auth) { auth.signOut().catch(function(e){}); }
  localStorage.removeItem('fintech_session');
  currentUser = null;
  currentPage = 'dashboard';
  _fbReady = false;
  $('loginScreen').style.display = 'flex';
  $('appScreen').style.display = 'none';
  toggleSidebar(true);
}

function setupApp() {
  const u = currentUser;
  const roleLabel = u.role==='admin'?'مدير':u.role==='supervisor'?'مشرف':'عضو';
  $('topUsername').textContent = u.name;
  $('topRole').textContent = roleLabel;
  $('topAvatar').textContent = u.name.charAt(0);
  $('sidebarName').textContent = u.name;
  $('sidebarTitle').textContent = u.title || roleLabel;
  buildNav();
  updatePendingBadge();
  updateEmailNotifLabel();
  navigate('dashboard');
}

function buildNav() {
  const items = [
    {id:'dashboard',icon:'📊',label:'لوحة التحكم'},
    ...(currentUser.role!=='supervisor'?[{id:'tasks',icon:'✅',label:'المهام'}]:[]),
    {id:'reports',icon:'📝',label:'التقارير'},
    ...(currentUser.role!=='member'||currentUser.dept==5?[{id:'approvals',icon:'📋',label:'الموافقات'}]:[]),
    {id:'announcements',icon:'📢',label:'لوحة الإعلانات'},
    ...(currentUser.role!=='supervisor'?[{id:'teams',icon:'👥',label:'الفرق والأعضاء'}]:[]),
    ...(currentUser.role==='admin'||currentUser.dept==5?[{id:'structure',icon:'🏛️',label:'الهيكل التنظيمي'}]:[]),
    ...(currentUser.role!=='supervisor'?[{id:'timeline',icon:'📅',label:'الجدول الزمني'}]:[]),
    ...((currentUser.role==='admin'||currentUser.dept==5)?[{id:'warnings',icon:'⚠️',label:'الإنذارات'}]:[]),
    ...(currentUser.role!=='supervisor'?[{id:'companies',icon:'🏢',label:'الشركات والشراكات'}]:[]),
    {id:'wbs',icon:'📐',label:'مرجعيات المشروع'},
    {id:'bugs',icon:'📢',label:'بلاغات المشاكل'},
  ];
  $('navItems').innerHTML = items.map(i =>
    `<button class="nav-btn ${currentPage===i.id?'active':''}" onclick="navigate('${i.id}')">
      <span class="nav-icon">${i.icon}</span>${i.label}
    </button>`
  ).join('');
}

function updatePendingBadge() {
  const c = pendingCount();
  const b = $('pendingBadge');
  if(c > 0 && (currentUser.role !== 'member' || currentUser.dept==5)) { b.style.display='inline-block'; b.textContent=c+' موافقة معلقة'; }
  else { b.style.display='none'; }
}

function toggleSidebar(forceClose) {
  const s = $('sidebar'), o = $('sidebarOverlay');
  if(forceClose) { s.classList.remove('open'); o.classList.remove('open'); return; }
  s.classList.toggle('open'); o.classList.toggle('open');
}

var navHistory = [];

function navigate(page) {
  // Role-based page protection
  if(currentUser.role==='supervisor' && ['tasks','teams','timeline','companies','structure','warnings'].indexOf(page)!==-1) {
    page = 'dashboard';
  }
  if(currentUser.role==='member' && ['warnings','structure'].indexOf(page)!==-1 && currentUser.dept!=5) {
    page = 'dashboard';
  }
  if(currentPage && currentPage !== page) navHistory.push(currentPage);
  currentPage = page;
  selectedDept = null;
  toggleSidebar(true);
  buildNav();
  const renderers = {dashboard:renderDashboard,tasks:renderTasks,reports:renderReports,approvals:renderApprovals,announcements:renderAnnouncements,teams:renderTeams,structure:renderStructure,timeline:renderTimeline,warnings:renderWarnings,bugs:renderBugs,companies:renderCompanies,wbs:renderWBS};
  if(renderers[page]) renderers[page]();
  // Add back bar
  if(page !== 'dashboard') {
    var mc = document.getElementById('mainContent');
    if(mc) mc.insertAdjacentHTML('afterbegin',
      '<div onclick="goBack()" style="display:flex;align-items:center;gap:8px;padding:10px 16px;margin-bottom:16px;cursor:pointer;color:var(--gold);font-weight:700;font-size:14px;border-radius:10px;transition:all 0.2s" onmouseover="this.style.background=\'var(--slate-50)\'" onmouseout="this.style.background=\'\'">→ رجوع</div>');
  }
  window.scrollTo(0,0);
}

function goBack() {
  if(navHistory.length > 0) {
    var prev = navHistory.pop();
    currentPage = prev;
    selectedDept = null;
    toggleSidebar(true);
    buildNav();
    var renderers = {dashboard:renderDashboard,tasks:renderTasks,reports:renderReports,approvals:renderApprovals,announcements:renderAnnouncements,teams:renderTeams,structure:renderStructure,timeline:renderTimeline,warnings:renderWarnings,bugs:renderBugs,companies:renderCompanies,wbs:renderWBS};
    if(renderers[prev]) renderers[prev]();
    if(prev !== 'dashboard') {
      var mc = document.getElementById('mainContent');
      if(mc) mc.insertAdjacentHTML('afterbegin',
        '<div onclick="goBack()" style="display:flex;align-items:center;gap:8px;padding:10px 16px;margin-bottom:16px;cursor:pointer;color:var(--gold);font-weight:700;font-size:14px;border-radius:10px;transition:all 0.2s" onmouseover="this.style.background=\'var(--slate-50)\'" onmouseout="this.style.background=\'\'">→ رجوع</div>');
    }
    window.scrollTo(0,0);
  } else {
    navigate('dashboard');
  }
}

            <div style="width:8px;height:8px;border-radius:50%;background:${STATUS[t.status].color};flex-shrink:0"></div>
            <div style="flex:1"><div style="font-size:13px;font-weight:700">${t.title}</div><div style="font-size:11px;color:var(--slate-400)">${m?.name||''}</div></div>
            ${badge(STATUS[t.status].label,STATUS[t.status].color,STATUS[t.status].bg)}
          </div>`;
        }).join('')}
        ${myTasks.length===0?'<div style="text-align:center;padding:20px;color:var(--slate-400)">لا توجد مهام بعد</div>':''}
      </div>
    </div>`;

  // Animate counters
  setTimeout(function(){
    document.querySelectorAll('.stat-value').forEach(function(el){
      var target = parseInt(el.textContent);
      if(isNaN(target)) return;
      var isPercent = el.textContent.includes('%');
      var current = 0;
      var step = Math.max(1, Math.ceil(target / 30));
      var interval = setInterval(function(){
        current += step;
        if(current >= target) { current = target; clearInterval(interval); }
        el.textContent = current + (isPercent ? '%' : '');
      }, 30);
    });
  }, 300);
}

// TASKS

let taskFilter = 'all', taskDeptFilter = 'all';

function renderTasks() {
  let myTasks = (currentUser.role==='member' && currentUser.dept!=5) ? tasks.filter(t=>String(t.assignedTo)===String(currentUser.id)) : tasks;
  let filtered = myTasks.filter(t => {
    if(taskFilter!=='all' && t.status!==taskFilter) return false;
    if(taskDeptFilter!=='all' && t.dept!==parseInt(taskDeptFilter)) return false;
    return true;
  });

  $('mainContent').innerHTML = `
    <div class="flex-between page-header animate-in">
      <div><div class="page-title">المهام</div><div class="page-sub">${filtered.length} مهمة</div></div>
      ${currentUser.role!=='supervisor'?'<button class="btn btn-primary" onclick="showAddTaskModal()">➕ مهمة جديدة</button>':''}
    </div>
    <div class="filter-bar animate-in" style="animation-delay:0.05s">
      ${[{v:'all',l:'الكل'},...Object.entries(STATUS).map(([k,v])=>({v:k,l:v.label}))].map(f=>
        `<button class="filter-btn ${taskFilter===f.v?'active':''}" onclick="taskFilter='${f.v}';renderTasks()">${f.l}</button>`
      ).join('')}
      <select class="form-select" style="width:auto;padding:7px 14px;border-radius:20px;font-size:12px" onchange="taskDeptFilter=this.value;renderTasks()">
        <option value="all" ${taskDeptFilter==='all'?'selected':''}>جميع الإدارات</option>
        ${DEPARTMENTS.map(d=>`<option value="${d.id}" ${taskDeptFilter==d.id?'selected':''}>${d.name}</option>`).join('')}
      </select>
    </div>
    ${filtered.length===0?`<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-title">لا توجد مهام</div></div>`:
      filtered.map((t,i)=>{
        const m=getMember(t.assignedTo), d=getDept(t.dept);
        return `<div class="task-card animate-in" style="animation-delay:${0.05+i*0.04}s;border-right-color:${STATUS[t.status].color}">
          <div class="task-badges">
            ${badge(STATUS[t.status].label,STATUS[t.status].color,STATUS[t.status].bg)}
            ${badge('⬤ '+PRIORITY[t.priority].label,PRIORITY[t.priority].color)}
            ${d?badge(d.icon+' '+d.name,d.color):''}
          </div>
          <div class="task-title">${t.title}</div>
          ${t.desc?`<div class="task-desc">${t.desc}</div>`:''}
          <div class="task-meta">
            <span>👤 ${m?.name||'غير محدد'}</span>
            ${t.deadline?`<span>📅 ${t.deadline}</span>`:''}
            <span>📊 ${t.progress}%</span>
          </div>
          <div class="progress-bar mt-10"><div class="progress-fill" style="width:${t.progress}%;background:${STATUS[t.status].color}"></div></div>
          ${(currentUser.role==='admin'||currentUser.dept==5||String(t.assignedTo)===String(currentUser.id))?`
            <div class="task-actions">
              ${t.status!=='completed'?`<button class="btn btn-success btn-sm" onclick="updateTask(${t.id},'completed',100)">✅ إنجاز</button>`:''}
              ${t.status==='completed'?`<button class="btn btn-danger btn-sm" onclick="updateTask(${t.id},'in_progress',80)">↩️ تراجع</button>`:''}
              ${t.status==='not_started'?`<button class="btn btn-secondary btn-sm" onclick="updateTask(${t.id},'in_progress',10)">▶️ بدء</button>`:''}
              ${t.status==='in_progress'?`<select class="form-select" style="padding:4px 10px;border-radius:8px;font-size:12px;width:auto" onchange="updateTask(${t.id},'in_progress',parseInt(this.value))">
                ${[10,20,30,40,50,60,70,80,90].map(v=>`<option value="${v}" ${t.progress===v?'selected':''}>${v}%</option>`).join('')}
              </select>`:''}
              ${t.status==='delayed'?`<button class="btn btn-secondary btn-sm" onclick="updateTask(${t.id},'in_progress',${t.progress})">▶️ استئناف</button>`:''}
            </div>`:''}
        </div>`;
      }).join('')}`;
}

function updateTask(id, status, progress) {
  tasks = tasks.map(t => t.id===id ? {...t, status, progress, completedAt:status==='completed'?today():t.completedAt} : t);
  renderTasks();
}

function showAddTaskModal() {
  showModal('➕ إضافة مهمة جديدة', `
    <div class="form-group"><label class="form-label">عنوان المهمة</label><input class="form-input" id="newTaskTitle" placeholder="اكتب عنوان المهمة..."></div>
    <div class="form-group"><label class="form-label">الوصف</label><textarea class="form-textarea" id="newTaskDesc" placeholder="وصف تفصيلي للمهمة..."></textarea></div>
    <div class="form-group"><label class="form-label">الإدارة</label><select class="form-select" id="newTaskDept" onchange="filterTaskTeams();filterTaskMembersSearch()">
      <option value="">جميع الإدارات</option>${DEPARTMENTS.map(d=>`<option value="${d.id}">${d.icon} ${d.name}</option>`).join('')}
    </select></div>
    <div class="form-group"><label class="form-label">الفريق</label><select class="form-select" id="newTaskTeam" onchange="filterTaskMembersSearch()">
      <option value="">كل الفرق</option>
    </select></div>
    <div class="form-group"><label class="form-label">إسناد إلى</label><div id="taskAssignContainer"></div></div>
    <div class="form-group"><label class="form-label">الأولوية</label><select class="form-select" id="newTaskPriority">
      ${Object.entries(PRIORITY).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('')}
    </select></div>
    <div class="form-group"><label class="form-label">الموعد النهائي</label><input class="form-input" id="newTaskDeadline" type="date"></div>
    <button class="btn btn-primary btn-lg btn-block" onclick="addTask()">إضافة المهمة</button>
  `);
  // Initialize searchable dropdown
  buildSearchSelect('taskAssignContainer', {
    filterRole: null,
    placeholder: '🔍 ابحث باسم العضو...',
    hiddenInputId: 'newTaskAssign',
    showCurrentFirst: true
  });
}

function filterTaskMembersSearch() {
  var deptId = parseInt(document.getElementById('newTaskDept')?.value) || 0;
  var teamId = parseInt(document.getElementById('newTaskTeam')?.value) || 0;
  var listEl = document.getElementById('taskAssignContainer_list');
  if(!listEl) return;
  var items = listEl.querySelectorAll('.search-select-item');
  items.forEach(function(it){
    var d = parseInt(it.getAttribute('data-dept'))||0;
    var t = parseInt(it.getAttribute('data-team'))||0;
    var show = true;
    if(deptId && d && d !== deptId) show = false;
    if(teamId && t && t !== teamId) show = false;
    it.style.display = show ? '' : 'none';
  });
}

function addTask() {
  const title=$('newTaskTitle').value.trim();
  if(!title) { showToast('⚠️ يرجى إدخال عنوان المهمة','#DC2626'); return; }
  tasks.push({id:Date.now(),title,desc:$('newTaskDesc').value,assignedTo:parseInt($('newTaskAssign').value)||currentUser.id,
    dept:parseInt($('newTaskDept').value)||null,teamId:parseInt($('newTaskTeam')?.value)||null,status:'not_started',priority:$('newTaskPriority').value,
    deadline:$('newTaskDeadline').value,createdAt:today(),progress:0});
  var newTask = tasks[tasks.length-1];
  hideModal(); renderTasks();

  // Email notification to assigned member
  if(newTask.assignedTo && newTask.assignedTo !== currentUser.id) {
    var prioLabel = {urgent:'🔴 عاجلة',high:'🟠 عالية',medium:'🟡 متوسطة',low:'🟢 منخفضة'}[newTask.priority]||'متوسطة';
    notifyMember(newTask.assignedTo, 'مهمة جديدة مسندة إليك: '+title, emailBody('✅','تم إسناد مهمة جديدة إليك',
      [{label:'المهمة',value:title},{label:'الأولوية',value:prioLabel},{label:'الموعد',value:newTask.deadline||'غير محدد'},{label:'بواسطة',value:currentUser.name}], '#2563EB'));
  }
}

function buildReturnedBanner(returnedReports, count) {
  var cards = returnedReports.map(function(r){
    return '<div style="padding:12px 16px;background:#fff;border-radius:10px;border:1px solid #FECACA;margin-bottom:8px">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">' +
      '<div style="flex:1"><div style="font-weight:700;font-size:14px;margin-bottom:4px">'+r.title+'</div>' +
      '<div style="font-size:12px;color:#DC2626;background:#FEF2F2;padding:6px 10px;border-radius:6px;margin-top:4px"><strong>↩️ سبب الإرجاع:</strong> '+(r.rejectReason||'يرجى المراجعة والتعديل')+'</div></div>' +
      '<button onclick="resubmitReport('+r.id+')" style="padding:10px 20px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:13px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#fff;white-space:nowrap;flex-shrink:0">📤 إعادة الرفع</button></div></div>';
  }).join('');

  return '<div class="card mb-24 animate-in" style="border:2px solid #DC2626;background:linear-gradient(135deg,#FEF2F2,#fff)">' +
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">' +
    '<span style="font-size:28px;animation:pulse 1.5s ease infinite">↩️</span>' +
    '<div><div style="font-weight:800;font-size:16px;color:#DC2626">لديك '+count+' تقرير مُرتجع يحتاج مراجعتك</div>' +
    '<div style="font-size:12px;color:#991B1B;margin-top:2px">راجع الملاحظات وأعد رفع التقرير</div></div></div>' +
    cards + '</div>';
}

function renderReports() {
  var visibleReports = reports.filter(function(r) {
    if(r.status==='published') return true;
    if(currentUser.role==='admin') return true;
    if(String(r.author)===String(currentUser.id)) return true;
    return false;
  });
  var pendingForAdmin = reports.filter(function(r){return r.status==='pending_approval'}).length;
  var returnedForMe = reports.filter(function(r){return r.status==='returned'&&String(r.author)===String(currentUser.id)}).length;
  var returnedReports = reports.filter(function(r){return r.status==='returned'&&String(r.author)===String(currentUser.id)});
  $('mainContent').innerHTML = `
    <div class="flex-between page-header animate-in">
      <div><div class="page-title">التقارير</div><div class="page-sub">${visibleReports.length} تقرير${currentUser.role==='admin'&&pendingForAdmin>0?' — <span style="color:#D97706;font-weight:800">'+pendingForAdmin+' بانتظار موافقتك</span>':''}</div></div>
      ${currentUser.role!=='supervisor'?'<button class="btn btn-primary" onclick="showAddReportModal()">📝 كتابة تقرير</button>':''}
    </div>

    ${returnedForMe>0?buildReturnedBanner(returnedReports,returnedForMe):''}
    ${visibleReports.length===0?`<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-title">لا توجد تقارير</div></div>`:
      visibleReports.slice().sort((a,b)=>b.id-a.id).map((r,i)=>{
        const author=getMember(r.author), d=getDept(r.dept);
        const typeLabel = r.type==='progress'?'📊 تقدم':r.type==='financial'?'💰 مالي':'📋 عام';
        const statusInfo = r.status==='published'?{l:'منشور ✅',c:'#059669',bg:'#ECFDF5'}:r.status==='pending_approval'?{l:'بانتظار الموافقة ⏳',c:'#D97706',bg:'#FEF3C7'}:r.status==='returned'?{l:'مُرتجع ↩️',c:'#DC2626',bg:'#FEF2F2'}:{l:'مسودة 📝',c:'#64748B',bg:'#F1F5F9'};
        return `<div class="report-card animate-in" style="animation-delay:${0.05+i*0.04}s">
          <div class="flex-between">
            <div style="flex:1">
              <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
                ${badge(statusInfo.l,statusInfo.c,statusInfo.bg)}
                ${badge(typeLabel,'#64748B')} ${d?badge(d.icon+' '+d.name,d.color):''}
              </div>
              <div style="font-size:16px;font-weight:700;margin-bottom:4px">${r.title}</div>
              <div style="font-size:13px;color:var(--slate-500);line-height:1.7">${r.content?(r.content.slice(0,200)+(r.content.length>200?'...':'')):'(تقرير بملف مرفق)'}</div>
              ${r.file?`<div onclick="openReportFile(${r.id})" style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:${(r.file.data||r.file.url)?'#EFF6FF':'#F1F5F9'};border-radius:8px;font-size:12px;color:${(r.file.data||r.file.url)?'var(--blue)':'var(--slate-400)'};font-weight:600;margin-top:8px;cursor:pointer;transition:all 0.2s;border:1px solid ${(r.file.data||r.file.url)?'#BFDBFE':'#E2E8F0'}" onmouseover="this.style.background='${(r.file.data||r.file.url)?'#DBEAFE':'#F1F5F9'}'" onmouseout="this.style.background='${(r.file.data||r.file.url)?'#EFF6FF':'#F1F5F9'}'">📎 ${r.file.name} (${r.file.size}) ${(r.file.data||r.file.url)?'— اضغط للتحميل ⬇️':''}</div>`:''}
              ${r.images&&r.images.length>0?`<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px">${r.images.map(function(img,imgIdx){return '<img src="'+(img.url||img.data)+'" onclick="viewReportImage('+r.id+','+imgIdx+')" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:2px solid var(--slate-200);cursor:pointer;transition:all 0.2s" onmouseover="this.style.transform=\'scale(1.05)\'" onmouseout="this.style.transform=\'\'">'}).join('')}</div>`:''}
              <div style="font-size:12px;color:var(--slate-400);margin-top:8px">✍️ ${author?.name||''} — 📅 ${r.date}</div>
              ${r.rejectReason?`<div style="margin-top:8px;padding:10px 14px;background:#FEF2F2;border-radius:8px;border:1px solid #FECACA"><span style="font-size:12px;color:#DC2626;font-weight:700">↩️ سبب الإرجاع:</span> <span style="font-size:12px;color:#991B1B">${r.rejectReason}</span></div>`:''}
            </div>
            <div style="display:flex;gap:6px;flex-direction:column;align-items:flex-start;flex-shrink:0">
              ${r.status==='pending_approval'&&currentUser.role==='admin'?`
                <button style="padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:13px;background:linear-gradient(135deg,#059669,#047857);color:#fff;transition:all 0.2s" onclick="approveReport(${r.id})" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform=''">✅ موافقة ونشر</button>
                <button class="btn btn-sm" style="background:#FEF2F2;color:#DC2626;font-weight:700" onclick="rejectReport(${r.id})">↩️ إرجاع للعضو</button>`:''}
              ${r.status==='draft'&&currentUser.role==='admin'?`<button style="padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:13px;background:linear-gradient(135deg,#059669,#047857);color:#fff;transition:all 0.2s" onclick="publishReport(${r.id})" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform=''">📤 نشر</button>`:''}
              ${r.status==='returned'&&String(r.author)===String(currentUser.id)?`<button style="padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:13px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#fff;transition:all 0.2s" onclick="resubmitReport(${r.id})">📤 إعادة الرفع</button>`:''}
              ${(currentUser.role==='admin'||String(r.author)===String(currentUser.id))?`<button class="btn btn-danger btn-sm" onclick="deleteReport(${r.id})">🗑️ حذف</button>`:''}
            </div>
          </div>
        </div>`;
      }).join('')}`;
}

function publishReport(id) {
  reports=reports.map(function(r){return r.id===id?Object.assign({},r,{status:'published'}):r;});
  renderReports();
  showToast('✅ تم نشر التقرير بنجاح','#059669');
}

function approveReport(id) {
  var rpt = reports.find(function(r){return r.id===id});
  reports=reports.map(function(r){return r.id===id?Object.assign({},r,{status:'published',approvedBy:currentUser.id,approvedDate:today()}):r;});
  renderReports(); saveSession();
  showToast('✅ تمت الموافقة ونشر التقرير','#059669');
  if(rpt) notifyMember(rpt.author, 'تمت الموافقة على تقريرك: '+rpt.title, emailBody('✅','تمت الموافقة على تقريرك ونشره',
    [{label:'العنوان',value:rpt.title},{label:'بواسطة',value:currentUser.name},{label:'التاريخ',value:today()}], '#059669'));
}

function rejectReport(id) {
  showModal('↩️ إرجاع التقرير',
    '<div class="form-group"><label class="form-label">سبب الإرجاع (اختياري)</label><textarea class="form-textarea" id="rejectReportReason" placeholder="اكتب ملاحظاتك للعضو..."></textarea></div>' +
    '<div style="display:flex;gap:10px"><button class="btn btn-lg" style="flex:1;background:#DC2626;color:#fff" onclick="confirmRejectReport('+id+')">↩️ إرجاع</button><button class="btn btn-secondary btn-lg" style="flex:1" onclick="hideModal()">إلغاء</button></div>');
}

function confirmRejectReport(id) {
  var reason = document.getElementById('rejectReportReason').value.trim();
  var rpt = reports.find(function(r){return r.id===id});
  reports=reports.map(function(r){return r.id===id?Object.assign({},r,{status:'returned',rejectReason:reason||'تم إرجاع التقرير — يرجى المراجعة والتعديل',rejectedBy:currentUser.id}):r;});
  hideModal(); renderReports(); saveSession();
  showToast('↩️ تم إرجاع التقرير للعضو','#DC2626');
  if(rpt) notifyMember(rpt.author, 'تقريرك مُرتجع: '+rpt.title, emailBody('↩️','تم إرجاع تقريرك للمراجعة',
    [{label:'العنوان',value:rpt.title},{label:'السبب',value:reason||'يرجى المراجعة والتعديل'},{label:'بواسطة',value:currentUser.name}], '#DC2626'));
}

function resubmitReport(id) {
  reports=reports.map(function(r){return r.id===id?Object.assign({},r,{status:'pending_approval',rejectReason:null,rejectedBy:null}):r;});
  renderReports(); saveSession();
  showToast('📤 تم إعادة رفع التقرير — بانتظار موافقة المدير','#D97706');
}

function viewReportImage(reportId, imgIdx) {
  var rpt = reports.find(function(r){return r.id===reportId});
  if(!rpt||!rpt.images||!rpt.images[imgIdx]) return;
  var img = rpt.images[imgIdx];
  var total = rpt.images.length;
  showModal('🖼️ صورة '+(imgIdx+1)+' من '+total+' — '+rpt.title,
    '<div style="text-align:center">' +
    '<img src="'+(img.url||img.data)+'" style="max-width:100%;max-height:70vh;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.1)">' +
    '<div style="margin-top:12px;display:flex;gap:8px;justify-content:center">' +
    (imgIdx>0?'<button class="btn btn-secondary" onclick="viewReportImage('+reportId+','+(imgIdx-1)+')">→ السابقة</button>':'') +
    (imgIdx<total-1?'<button class="btn btn-secondary" onclick="viewReportImage('+reportId+','+(imgIdx+1)+')">← التالية</button>':'') +
    '</div></div>');
}

function remindSupervisorApprovals() {
  var pendingApps = approvals.filter(function(a){return a.status==='pending'});
  if(pendingApps.length===0) { showToast('✅ لا توجد موافقات معلقة','#059669'); return; }
  var urgentCount = pendingApps.filter(function(a){return a.urgency==='urgent'}).length;
  var listHtml = pendingApps.slice(0,5).map(function(a){
    var req = getMember(a.requester);
    return '<tr><td style="padding:8px;border-bottom:1px solid #E2E8F0;font-weight:700">'+(a.urgency==='urgent'?'🔴 ':'')+a.title+'</td><td style="padding:8px;border-bottom:1px solid #E2E8F0;color:#64748B">'+(req?req.name:'')+'</td><td style="padding:8px;border-bottom:1px solid #E2E8F0;color:#64748B">'+a.date+'</td></tr>';
  }).join('');

  var body = emailBody('📋','تذكير: لديك '+pendingApps.length+' طلب موافقة معلق',
    [{label:'إجمالي المعلقة',value:pendingApps.length+' طلب'},{label:'منها عاجل',value:urgentCount>0?urgentCount+' طلب 🔴':'لا يوجد'},{label:'بواسطة',value:currentUser.name}],
    urgentCount>0?'#DC2626':'#D97706') +
    '<table style="width:100%;border-collapse:collapse;margin-top:12px;font-size:13px"><thead><tr style="background:#F8FAFC"><th style="padding:8px;text-align:right;border-bottom:2px solid #E2E8F0">الطلب</th><th style="padding:8px;text-align:right;border-bottom:2px solid #E2E8F0">مقدم الطلب</th><th style="padding:8px;text-align:right;border-bottom:2px solid #E2E8F0">التاريخ</th></tr></thead><tbody>'+listHtml+'</tbody></table>' +
    (pendingApps.length>5?'<div style="text-align:center;margin-top:8px;font-size:12px;color:#64748B">و '+(pendingApps.length-5)+' طلبات أخرى...</div>':'');

  notifySupervisors('تذكير: '+pendingApps.length+' طلب موافقة بانتظار مراجعتك', body);
  showToast('📧 تم إرسال تذكير للمشرف الجامعي','#059669');
}

function remindSupervisorSingle(approvalId) {
  var a = approvals.find(function(x){return x.id===approvalId});
  if(!a) return;
  var req = getMember(a.requester);
  var body = emailBody(
    a.urgency==='urgent'?'🔴':'📋',
    'تذكير: طلب موافقة بانتظار مراجعتك',
    [
      {label:'عنوان الطلب',value:a.title},
      {label:'مقدم الطلب',value:req?req.name:'غير محدد'},
      {label:'تاريخ التقديم',value:a.date},
      {label:'الأولوية',value:a.urgency==='urgent'?'🔴 عاجل':'عادي'},
      {label:'ملاحظات',value:a.notes||'—'}
    ],
    a.urgency==='urgent'?'#DC2626':'#D97706'
  );
  notifySupervisors('تذكير: طلب موافقة "'+a.title+'" بانتظار مراجعتك', body);
  showToast('📧 تم إرسال تذكير للمشرف بخصوص: '+a.title,'#059669');
}

function showToast(msg, color) {
  var toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;top:80px;left:50%;transform:translateX(-50%);background:'+color+';color:#fff;padding:12px 24px;border-radius:12px;font-weight:700;font-size:14px;z-index:10000;animation:slideDown 0.3s ease;box-shadow:0 4px 20px rgba(0,0,0,0.15);font-family:Tajawal,sans-serif;max-width:90%;text-align:center';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(function(){toast.remove()},3000);
}

function deleteReport(id) {
  showModal('🗑️ تأكيد الحذف', '<p style="font-size:14px;color:var(--slate-700);text-align:center;margin-bottom:20px">هل أنت متأكد من حذف هذا التقرير؟ لا يمكن التراجع عن هذا الإجراء.</p><div style="display:flex;gap:10px"><button class="btn btn-danger btn-block" onclick="confirmDeleteReport('+id+')">🗑️ نعم، حذف</button><button class="btn btn-secondary btn-block" onclick="hideModal()">إلغاء</button></div>');
}
function confirmDeleteReport(id) {
  reports = reports.filter(r => r.id !== id);
  hideModal(); renderReports(); saveSession();
}

function deleteApproval(id) {

function confirmDeleteApproval(id) {
  approvals = approvals.filter(a => a.id !== id);
  hideModal(); updatePendingBadge(); renderApprovals(); saveSession();
}

function addReport(status) {
  var st = status || 'draft';
  const title=$('newReportTitle').value.trim(), content=$('newReportContent').value.trim();
  if(!title) { showToast('⚠️ يرجى إدخال عنوان التقرير','#DC2626'); return; }
  if(!content && !reportFile) { showToast('⚠️ يرجى كتابة محتوى أو إرفاق ملف','#DC2626'); return; }

  // Capture ALL form values BEFORE closing modal
  var deptVal = parseInt($('newReportDept')?.value)||null;
  var typeVal = $('newReportType')?.value||'progress';
  var localFile = reportFile ? Object.assign({},reportFile) : null;
  var localImages = reportImages.length>0 ? reportImages.slice() : null;
  reportFile=null; reportImages=[];
  hideModal();

  // Show uploading state
  if(localFile || localImages) showToast('⏳ جاري رفع الملفات...','var(--blue)');

  // Upload files to Firebase Storage, then save
  var uploadFile = localFile ? uploadToStorage(localFile, 'reports') : Promise.resolve(null);
  var uploadImgs = localImages ? uploadImagesToStorage(localImages) : Promise.resolve(null);

  Promise.all([uploadFile, uploadImgs]).then(function(results) {
    var cloudFile = results[0];
    var cloudImages = results[1];
    reports.push({id:Date.now(),title:title,content:content,author:currentUser.id,date:today(),dept:deptVal,status:st,type:typeVal,file:cloudFile,images:cloudImages});
    renderReports(); saveSession();

    var toastMsg = st==='published' ? '✅ تم نشر التقرير بنجاح' : st==='pending_approval' ? '📤 تم رفع التقرير — بانتظار موافقة المدير' : '📝 تم حفظ المسودة';
    var toastColor = st==='published' ? '#059669' : st==='pending_approval' ? '#D97706' : 'var(--blue)';
    showToast(toastMsg, toastColor);

    // Email notifications
    if(st==='pending_approval') {
      var rptBody = emailBody('📝','تقرير جديد بانتظار الموافقة',
        [{label:'العنوان',value:title},{label:'الكاتب',value:currentUser.name},{label:'التاريخ',value:today()}], '#D97706');
      notifyAdmin('تقرير جديد بانتظار الموافقة: '+title, rptBody);
      notifySupervisors('تقرير جديد بانتظار الموافقة: '+title, rptBody);
    }
    if(st==='published') {
      var pubBody = emailBody('📝','تم نشر تقرير جديد',
        [{label:'العنوان',value:title},{label:'الكاتب',value:currentUser.name},{label:'التاريخ',value:today()}], '#059669');
      notifySupervisors('تقرير جديد منشور: '+title, pubBody);
    }
  }).catch(function(e){ console.error('Report save error:', e); showToast('⚠️ حدث خطأ','#DC2626'); });
}
